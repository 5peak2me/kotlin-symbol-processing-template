# GitHub Actions Workflow responsible for cleaning up the Kotlin Symbol Processing Template repository from the template-specific files and configurations.
# This workflow is supposed to be triggered automatically when a new template-based repository has been created.

name: Template Cleanup
on:
  push:
    branches: [main]

jobs:

  # Run a cleaning process only if the workflow is triggered by the non-"kotlin-symbol-processing-template" repository.
  template-cleanup:
    name: Template Cleanup
    runs-on: ubuntu-latest
    if: github.event.repository.name != 'kotlin-symbol-processing-template'
    permissions:
      contents: write
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Cleanup project
      - name: Cleanup
        run: |
          export LC_CTYPE=C
          export LANG=C

          # Prepare variables
          NAME="${GITHUB_REPOSITORY##*/}"
          ACTOR=$(echo $GITHUB_ACTOR | tr '[:upper:]' '[:lower:]')
          SAFE_NAME=$(echo $NAME | sed 's/^ksp-//' | sed 's/[^a-zA-Z0-9]//g' | tr '[:upper:]' '[:lower:]')
          SAFE_ACTOR=$(echo $ACTOR | sed 's/[^a-zA-Z0-9]//g' | sed 's/5peak2me/speak2me/' | tr '[:upper:]' '[:lower:]')
          PLUGIN_ID="io.github.$ACTOR.ksp.$SAFE_NAME"
          GROUP="com.github.$SAFE_ACTOR.ksp.$SAFE_NAME"

          # Replace placeholders in the template-cleanup files
          sed -i "s/%NAME%/$NAME/g" .github/template-cleanup/*
          sed -i "s/%REPOSITORY%/${GITHUB_REPOSITORY/\//\\/}/g" .github/template-cleanup/*
          sed -i "s/%GROUP%/$GROUP/g" .github/template-cleanup/*
          sed -i "s/%PLUGIN_ID%/$PLUGIN_ID/g" .github/template-cleanup/*

          # Replace template package name in project files with $GROUP
          find processor -type f -exec sed -i "s/com.github.speak2me.ksp.template/$GROUP/g" {} +
          find runtime -type f -exec sed -i " s/com.github.speak2me.ksp.template/$GROUP/g" {} +

          # Move content
          cp -R .github/template-cleanup/. .

          # processor
          mkdir -p processor/src/main/java/${GROUP//.//}
          cp -R processor/src/main/java/com/github/speak2me/ksp/template/* processor/src/main/java/${GROUP//.//}/
          # mkdir -p processor/src/test/java/${GROUP//.//}
          # cp -R processor/src/test/java/com/github/speak2me/ksp/template/* processor/src/test/java/${GROUP//.//}/

          # gradle-plugin
          mkdir -p runtime/src/main/java/${GROUP//.//}
          cp -R runtime/src/main/java/com/github/speak2me/ksp/template/* runtime/src/main/java/${GROUP//.//}/

          # Cleanup
          rm -rf \
            .github/ISSUE_TEMPLATE \
            .github/readme \
            .github/template-cleanup \
            .github/workflows/template-cleanup.yml \
            .idea/icon.png \
            processor/src/main/java/com/github/speak2me/ksp/template/* \
            runtime/src/main/java/com/github/speak2me/ksp/template/* \
            CODE_OF_CONDUCT.md \
            LICENSE

      # Commit modified files
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Template cleanup"

      # Push changes
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
